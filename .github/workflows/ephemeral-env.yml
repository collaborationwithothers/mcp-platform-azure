# Gated live-test workflow for the v1 tracer bullet (issue 9 / ticket 5,
# docs/specs/v1-tracer-bullet.md). Manual only, cost-gated: never triggered by
# pull_request or push. Runs apply -> [call] -> destroy for the s1 and s2
# scenario compositions inside the `live-test` GitHub Environment only,
# runs-on: ubuntu-latest, OIDC-only auth (no client secret, no stored Azure
# credential). Per CLAUDE.md's hard safety rules, this is the ONLY workflow in
# this repo that may run terraform apply/destroy.
#
# This workflow proves apply -> call -> destroy for both compositions. The
# "call" stage (issue 9 slice 2) runs McpTestClient session/tool assertions,
# the raw-HTTP discovery assertions (401/WWW-Authenticate/PRM/wrong-audience/
# shadow-key), and the bounded registry poll (scripts/gate/invoke-and-assert.ps1
# -> tests/integration/discovery-assertions.ps1 + src/McpTestClient). Split,
# documented honestly (docs/specs/v1-tracer-bullet.md, Testing Decisions): the
# gate validates non-interactive session and discovery artifacts; it does NOT
# auto-exercise client-driven interactive discovery, which is validated manually
# in VS Code and recorded in docs/demos/README.md.
#
# Auth pattern verified 2026-07-12 via the azure-docs-verifier subagent:
# - azure/login@v2 with client-id/tenant-id/subscription-id (no
#   client-secret) is Microsoft's current documented OIDC login action:
#   https://learn.microsoft.com/azure/developer/github/connect-from-azure-openid-connect
# - The federated credential trusting this workflow must use an
#   Environment-scoped subject `repo:<org>/<repo>:environment:live-test`,
#   audience `api://AzureADTokenExchange`:
#   https://learn.microsoft.com/entra/workload-id/workload-identity-federation-create-trust
# - azure/login authenticates the Azure CLI only, not the azurerm/azapi
#   Terraform providers. Their own native OIDC support (ARM_USE_OIDC plus
#   ARM_CLIENT_ID/ARM_TENANT_ID/ARM_SUBSCRIPTION_ID) is documented on the
#   Terraform Registry, not Microsoft Learn (Microsoft Learn's own
#   "Authenticate Terraform to Azure" page does not mention OIDC as of
#   2026-07-12, confirmed stale by the verifier agent):
#   https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/guides/service_principal_oidc
#   Both mechanisms are configured below from the same OIDC identity.

name: Ephemeral live-test gate

on:
  workflow_dispatch:
    inputs:
      confirm_cost:
        description: "Type \"apply\" to confirm you understand this deploys billable Azure resources (APIM Basic v2, Flex Consumption, API Center) and accept them being destroyed at the end of this run."
        required: true
        type: string

# Only one live-test run at a time: prevents two runs racing on the same
# state keys or doubling billable resources.
concurrency:
  group: ephemeral-env-live-test
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest
    steps:
      - name: Require explicit cost confirmation
        shell: bash
        run: |
          if [ "${{ inputs.confirm_cost }}" != "apply" ]; then
            echo "::error::confirm_cost must be the literal string 'apply'. This run deploys billable Azure resources; the input exists so nobody triggers it by accident."
            exit 1
          fi

  live-test:
    name: apply-call-destroy
    needs: guard
    runs-on: ubuntu-latest
    environment: live-test
    env:
      # Shared OIDC identity for both the Azure CLI (azure/login) and the
      # Terraform azurerm/azapi providers/backends. No client secret; values
      # are non-secret app/tenant/subscription ids configured as GitHub
      # Environment variables on `live-test` (CLAUDE.md: never commit these
      # to the repo).
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_IN_AUTOMATION: "true"
      # State backend, key-per-composition (docs/specs/v1-tracer-bullet.md,
      # Terraform and state). The storage account is bootstrapped out of band
      # in its own resource group so this run's cleanup can never reach it.
      TF_STATE_STORAGE_ACCOUNT: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
      S1_STATE_KEY: s1-entra-mcp-server.tfstate
      S2_STATE_KEY: s2-apim-mcp-gateway.tfstate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # MUST stay here, immediately after azure/login and BEFORE the long s1
      # apply. azure/login caches the GitHub OIDC token it used as the client
      # assertion, and that token lives only ~5 minutes; unlike the azurerm and
      # azapi providers (ARM_USE_OIDC), the Azure CLI does NOT mint a fresh one.
      # The s1 Flex Consumption apply routinely runs longer than 5 minutes, so an
      # `az` call placed after it fails with AADSTS700024 ("Client assertion is
      # not within its valid time range"). Running this lookup while the
      # assertion is fresh avoids that; its step output persists for the later s2
      # steps that consume it. Do not move it below the apply.
      - name: Look up the OIDC principal's object id (for the registry poll's Data Reader grant)
        id: principal
        shell: bash
        run: |
          object_id="$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id -o tsv)"
          echo "object_id=${object_id}" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      # McpTestClient targets net10.0; the call stage runs it via `dotnet run`.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Issue 9 (reopened) decision: the gate must run harness assertions against
      # a live host, which requires deployed function code. Build and package the
      # MCP server once here, up front, so the artifact is ready before the s1
      # apply and the deploy step below. Flex Consumption one-deploy takes a zip
      # whose root is the publish output (host.json at the zip root).
      - name: Build and package the Functions MCP server (McpTools)
        shell: bash
        run: |
          set -euo pipefail
          publish_dir="${{ github.workspace }}/publish/mcptools"
          dotnet publish src/McpTools/McpTools.csproj -c Release -o "${publish_dir}"
          ( cd "${publish_dir}" && zip -r "${{ github.workspace }}/mcptools.zip" . )

      - name: Compute ephemeral resource group name and expiry tag
        id: rg
        shell: bash
        run: |
          rg_name="rg-mcp-tracer-${{ github.run_id }}"
          # 4-hour TTL: a policy choice for this gate's belt-and-braces expiry
          # tag, not a measured figure. The gate's own destroy step (below,
          # if: always()) is the primary cleanup mechanism; this tag is the
          # backstop if that step itself never runs (e.g. the runner is
          # killed outright).
          expiry="$(date -u -d '+4 hours' +%Y-%m-%dT%H:%M:%SZ)"
          echo "name=${rg_name}" >> "$GITHUB_OUTPUT"
          echo "expiry=${expiry}" >> "$GITHUB_OUTPUT"

      - name: Create ephemeral resource group
        shell: bash
        run: |
          az group create \
            --name "${{ steps.rg.outputs.name }}" \
            --location "${{ vars.LIVE_TEST_LOCATION }}" \
            --tags expiry="${{ steps.rg.outputs.expiry }}" scenario=v1-tracer-bullet

      # Written from the live-test environment's S1_TFVARS_JSON/S2_TFVARS_JSON
      # secrets (docs/runbooks/entra-app-registrations.md's out-of-band
      # values: entra_auth/entra_validation, prm_scope/prm_scopes,
      # name_prefix, storage_account_name, apim_name, registry_name, tags).
      # Secrets rather than variables because tenant/client ids are
      # org-identifying, even though they are not credentials.
      - name: Write composition tfvars
        shell: bash
        env:
          S1_TFVARS_JSON: ${{ secrets.S1_TFVARS_JSON }}
          S2_TFVARS_JSON: ${{ secrets.S2_TFVARS_JSON }}
        run: |
          printf '%s' "$S1_TFVARS_JSON" > "${{ github.workspace }}/s1.tfvars.json"
          printf '%s' "$S2_TFVARS_JSON" > "${{ github.workspace }}/s2.tfvars.json"

      - name: terraform init and apply - s1-entra-mcp-server
        working-directory: infra/terraform/scenarios/s1-entra-mcp-server
        shell: bash
        env:
          TF_VAR_resource_group_name: ${{ steps.rg.outputs.name }}
          TF_VAR_location: ${{ vars.LIVE_TEST_LOCATION }}
        run: |
          terraform init -input=false \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${S1_STATE_KEY}"
          terraform apply -input=false -auto-approve \
            -var-file="${{ github.workspace }}/s1.tfvars.json"

      # Issue 9 (reopened) decision: deploy the built package to the s1 Flex
      # Consumption app so the host specialises and the MCP extension registers
      # its mcp_extension system key (which the call stage's shadow-key arm and
      # the McpTestClient assertions require). Flex Consumption's supported
      # deployment technology is "One deploy"; on a Flex app the config-zip CLI
      # verb TRIGGERS One deploy -- upload to the module's managed-identity
      # deploymentpackage container -- NOT the legacy Kudu WEBSITE_RUN_FROM_
      # PACKAGE path the same verb uses on other plans (Microsoft Learn:
      # flex-consumption-how-to#deploy-your-code-project). The decision comment
      # named `az functionapp deploy`, but that command is Preview and not the
      # Learn-documented Flex path; config-zip is (see PR description). The .NET
      # isolated output is prebuilt by the publish step above, so no remote
      # build. Runs after the s1 apply (the app must exist) and before the s2
      # apply (APIM in s2 fronts the now-live s1 backend).
      - name: Deploy the Functions MCP server to the s1 Flex Consumption app
        working-directory: infra/terraform/scenarios/s1-entra-mcp-server
        shell: bash
        env:
          TF_VAR_resource_group_name: ${{ steps.rg.outputs.name }}
        run: |
          set -euo pipefail
          func_name="$(terraform output -raw function_app_name)"
          # config-zip triggers Flex One deploy: Kudu fetches a managed-identity
          # token to reach the deploymentpackage container. The s1 module pins
          # deployment storage to a user-assigned identity (mcp-function-host):
          # the system-assigned identity was not reliably usable on this path and
          # failed persistently with "MSITokenUnavailableException ... 400". The
          # user-assigned identity's Storage role assignment is created in the
          # same apply moments earlier, so a bounded retry with fixed backoff
          # remains as insurance against RBAC propagation (general Azure RBAC
          # propagation is up to ~10 min, but a user-assigned grant typically
          # settles fast). Exhaustion stays FATAL; no storage-account-key path.
          deploy_deadline=$(( SECONDS + 300 ))
          attempt=1
          until az functionapp deployment source config-zip \
                  --resource-group "${TF_VAR_resource_group_name}" \
                  --name "${func_name}" \
                  --src "${{ github.workspace }}/mcptools.zip"; do
            if [ "${SECONDS}" -ge "${deploy_deadline}" ]; then
              echo "::error::config-zip deploy did not succeed within 600s; the Flex deployment-storage identity/RBAC never became usable (see the MSITokenUnavailableException in this step's log)."
              exit 1
            fi
            echo "Deploy attempt ${attempt} failed (likely deployment-storage identity/RBAC not yet propagated); retrying in 30s."
            attempt=$(( attempt + 1 ))
            sleep 30
          done

      - name: terraform init and apply - s2-apim-mcp-gateway
        working-directory: infra/terraform/scenarios/s2-apim-mcp-gateway
        shell: bash
        env:
          TF_VAR_resource_group_name: ${{ steps.rg.outputs.name }}
          TF_VAR_location: ${{ vars.LIVE_TEST_LOCATION }}
          TF_VAR_data_reader_principal_ids: ${{ format('["{0}"]', steps.principal.outputs.object_id) }}
        run: |
          terraform init -input=false \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${S2_STATE_KEY}"
          terraform apply -input=false -auto-approve \
            -var-file="${{ github.workspace }}/s2.tfvars.json" \
            -var="s1_remote_state={\"storage_account_name\":\"${TF_STATE_STORAGE_ACCOUNT}\",\"container_name\":\"${TF_STATE_CONTAINER}\",\"key\":\"${S1_STATE_KEY}\"}"

      # Fresh OIDC login before the call stage. Same rationale as the teardown
      # and cleanup re-logins below: by this point the job has run past the
      # ~5-minute life of the initial azure/login client assertion (the s1/s2
      # applies alone exceed it, and APIM Basic v2 provisioning takes far
      # longer), and unlike the azurerm/azapi providers (ARM_USE_OIDC) the Azure
      # CLI does not mint a fresh OIDC token. The call stage makes two `az`
      # calls that would otherwise fail with AADSTS700024: the fatal API Center
      # data-plane token (az account get-access-token --resource
      # https://azure-apicenter.net, a new audience not cached at login) that the
      # registry poll needs, and the best-effort mcp_extension key lookup. This
      # step is NOT if: always() -- it belongs to the call path, which only runs
      # on a successful apply.
      - name: Azure re-login for call stage (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Call stage (issue 9 slice 2): McpTestClient session/tool assertions, the
      # raw-HTTP discovery assertions (401/WWW-Authenticate/PRM/wrong-audience/
      # shadow-key), and the bounded registry poll. Runs only on a successful
      # apply (no if: always()), between apply and the destroy steps below. The
      # gate does NOT auto-exercise interactive discovery; that is validated
      # manually in VS Code and recorded in docs/demos (spec: Testing Decisions).
      #
      # Identity/endpoint values are read from terraform outputs and the s2
      # tfvars (audience/tenant/test-client-id/server-name); the test client's
      # SECRET is a live-test Environment secret (TEST_CLIENT_SECRET), never in
      # the repo or in Terraform state (docs/runbooks/entra-app-registrations.md).
      - name: Call stage - McpTestClient, discovery assertions, registry poll
        shell: bash
        env:
          TF_VAR_resource_group_name: ${{ steps.rg.outputs.name }}
          TF_VAR_location: ${{ vars.LIVE_TEST_LOCATION }}
          TEST_CLIENT_SECRET: ${{ secrets.TEST_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          s1_dir=infra/terraform/scenarios/s1-entra-mcp-server
          s2_dir=infra/terraform/scenarios/s2-apim-mcp-gateway
          mcp_server_url="$(terraform -chdir="$s2_dir" output -raw mcp_server_url)"
          prm_url="$(terraform -chdir="$s2_dir" output -raw prm_url)"
          registry_url="$(terraform -chdir="$s2_dir" output -raw registry_endpoint_url)"
          backend_base="$(terraform -chdir="$s1_dir" output -raw mcp_backend_base_url)"
          backend_mcp_url="${backend_base%/}/runtime/webhooks/mcp"
          func_name="$(terraform -chdir="$s1_dir" output -raw function_app_name)"
          # entra_validation identity values (non-secret ids) from the s2 tfvars.
          audience="$(jq -r '.entra_validation.audience' "${GITHUB_WORKSPACE}/s2.tfvars.json")"
          tenant_id="$(jq -r '.entra_validation.tenant_id' "${GITHUB_WORKSPACE}/s2.tfvars.json")"
          client_id="$(jq -r '.entra_validation.allowed_client_application_ids[0]' "${GITHUB_WORKSPACE}/s2.tfvars.json")"
          server_name="$(jq -r '.server_name' "${GITHUB_WORKSPACE}/s2.tfvars.json")"
          # The real mcp_extension system key is REQUIRED for the backend
          # shadow-key arm: presenting a VALID key that Easy Auth still 401s is
          # what proves the shadow path is closed (spec story 31); a placeholder
          # would only prove an invalid key is rejected. The key is registered by
          # the MCP extension at host specialisation, which happens AFTER the code
          # deploy completes (not at deploy return), so poll for it rather than
          # reading it once: 15s interval, 300s (5 min) budget. Each attempt is
          # guarded (2>/dev/null || true) so a transient listkeys non-zero does
          # not trip set -e mid-loop; exhausting the budget stays FATAL (issue 9
          # decision, preserving PR #39's fail-loudly intent -- no placeholder).
          mcp_ext_key=""
          key_poll_deadline=$(( SECONDS + 300 ))
          while [ "${SECONDS}" -lt "${key_poll_deadline}" ]; do
            mcp_ext_key="$(az functionapp keys list -g "${TF_VAR_resource_group_name}" -n "${func_name}" --query 'systemKeys.mcp_extension' -o tsv 2>/dev/null || true)"
            if [ -n "${mcp_ext_key}" ]; then
              break
            fi
            echo "mcp_extension system key not registered yet (awaiting host specialisation); retrying in 15s."
            sleep 15
          done
          if [ -z "${mcp_ext_key}" ]; then
            echo "::error::Could not retrieve the mcp_extension system key; the backend shadow-key assertion needs it (spec story 31)."
            exit 1
          fi
          # --- Call-stage diagnostics (read-only, non-fatal): localise the MCP
          # 500 between the APIM passthrough and the Functions backend before the
          # assertions run. Probes the backend /runtime/webhooks/mcp directly with
          # a valid Entra token vs the same call through APIM, and dumps the
          # effective APIM MCP api config (backendId/serviceUrl/mcpProperties).
          # Temporary, remove once the call stage is green (issue 9). ---
          api_id="$(terraform -chdir="$s2_dir" output -raw mcp_server_api_id)"
          set +e
          diag_token="$(curl -sS --max-time 20 -X POST "https://login.microsoftonline.com/${tenant_id}/oauth2/v2.0/token" \
            -d "client_id=${client_id}" -d "client_secret=${TEST_CLIENT_SECRET}" \
            -d "grant_type=client_credentials" -d "scope=${audience}/.default" | jq -r '.access_token // empty')"
          if [ -n "${diag_token}" ]; then
            curl -sS --max-time 15 -o /dev/null -w "[diag] backend direct (${backend_mcp_url}) status: %{http_code}\n" \
              -H "Authorization: Bearer ${diag_token}" "${backend_mcp_url}"
            curl -sS --max-time 15 -o /dev/null -w "[diag] via APIM (${mcp_server_url}) status: %{http_code}\n" \
              -H "Authorization: Bearer ${diag_token}" "${mcp_server_url}"
          else
            echo "[diag] could not acquire a diagnostic token; skipping HTTP probes."
          fi
          echo "[diag] effective APIM MCP api config:"
          az rest --method GET --url "https://management.azure.com${api_id}?api-version=2025-09-01-preview" \
            --query "properties.{type:type,path:path,backendId:backendId,serviceUrl:serviceUrl,mcpProperties:mcpProperties}" -o json 2>/dev/null \
            || echo "[diag]   (az rest dump failed)"
          set -e
          # --- end diagnostics ---
          pwsh scripts/gate/invoke-and-assert.ps1 \
            -McpServerUrl "$mcp_server_url" \
            -PrmUrl "$prm_url" \
            -RegistryEndpointUrl "$registry_url" \
            -BackendMcpUrl "$backend_mcp_url" \
            -Audience "$audience" \
            -TenantId "$tenant_id" \
            -ClientId "$client_id" \
            -ClientSecret "$TEST_CLIENT_SECRET" \
            -ServerName "$server_name" \
            -McpExtensionKey "${mcp_ext_key:-}"

      - name: terraform destroy - s2-apim-mcp-gateway
        if: always()
        working-directory: infra/terraform/scenarios/s2-apim-mcp-gateway
        shell: bash
        env:
          TF_VAR_resource_group_name: ${{ steps.rg.outputs.name }}
          TF_VAR_location: ${{ vars.LIVE_TEST_LOCATION }}
          TF_VAR_data_reader_principal_ids: ${{ format('["{0}"]', steps.principal.outputs.object_id) }}
        run: |
          terraform destroy -input=false -auto-approve \
            -var-file="${{ github.workspace }}/s2.tfvars.json" \
            -var="s1_remote_state={\"storage_account_name\":\"${TF_STATE_STORAGE_ACCOUNT}\",\"container_name\":\"${TF_STATE_CONTAINER}\",\"key\":\"${S1_STATE_KEY}\"}"

      - name: terraform destroy - s1-entra-mcp-server
        if: always()
        working-directory: infra/terraform/scenarios/s1-entra-mcp-server
        shell: bash
        env:
          TF_VAR_resource_group_name: ${{ steps.rg.outputs.name }}
          TF_VAR_location: ${{ vars.LIVE_TEST_LOCATION }}
        run: |
          terraform destroy -input=false -auto-approve \
            -var-file="${{ github.workspace }}/s1.tfvars.json"

      # Refresh the Azure CLI credential before the final CLI-based cleanup. By
      # this point the job has run well past the ~5-minute life of the OIDC
      # client assertion from the initial azure/login (the s1/s2 applies and
      # destroys together take far longer), so a stale `az` call would fail with
      # AADSTS700024 and LEAK the ephemeral resource group. Unlike the azurerm
      # and azapi providers, the Azure CLI does not mint a fresh OIDC token, so
      # re-login explicitly. if: always() so cleanup authenticates even when an
      # earlier step failed.
      - name: Azure re-login for cleanup (OIDC)
        if: always()
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Delete ephemeral resource group and verify it is gone
        if: always()
        shell: bash
        run: |
          az group delete --name "${{ steps.rg.outputs.name }}" --yes
          if az group show --name "${{ steps.rg.outputs.name }}" >/dev/null 2>&1; then
            echo "::error::Resource group ${{ steps.rg.outputs.name }} still exists after delete. The expiry tag (${{ steps.rg.outputs.expiry }}) is the belt-and-braces backstop; verify the sweep process picks it up."
            exit 1
          fi
          echo "Confirmed: ${{ steps.rg.outputs.name }} no longer exists."
