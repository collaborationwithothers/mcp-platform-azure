# checkov configuration for the MCP-on-Azure platform. Auto-discovered by
# checkov from the repo root; no --config-file flag needed, matching how
# .github/workflows/ci.yml invokes it ("checkov --directory infra").
#
# CKV2_* entries are graph checks that an inline skip annotation on the
# resource does not suppress (verified locally against checkov 3.3.8: an
# inline annotation had no effect on these checks, a skip-check list here
# did). CKV_* entries are ordinary resource checks skipped here rather than
# inline because they are cross-cutting policy decisions worth a reviewer
# seeing in one place, not per-resource noise.

skip-check:
  # CMK encryption for storage needs a Key Vault; the private-network module
  # (which would carry Key Vault wiring) is v1.1, not v1.
  # docs/specs/v1-tracer-bullet.md, Out of Scope.
  - CKV2_AZURE_1 # Ensure storage for critical data are encrypted with Customer Managed Key
  - CKV2_AZURE_18 # Ensure that Storage Accounts use customer-managed key for encryption
  # Blob service read-request logging and private endpoints are
  # observability/private-networking wiring; those modules are v1.2/v1.1,
  # not v1. docs/specs/v1-tracer-bullet.md, Out of Scope.
  - CKV2_AZURE_21 # Ensure Storage logging is enabled for Blob service for read requests
  - CKV2_AZURE_33 # Ensure storage account is configured with private endpoint
  # Zone redundancy and a minimum-instance floor for failover are HA/DR
  # posture for a production tier; the tracer is a public-demo, small-scale
  # Flex Consumption deployment with no HA requirement in the spec (Compute
  # and the tool (S1)).
  - CKV_AZURE_225 # Ensure the App Service Plan is zone redundant
  - CKV_AZURE_212 # Ensure App Service has a minimum number of instances for failover
  # This check wants a git source pinned to a commit hash. This repo's own
  # convention for Azure Verified Modules is exact version pinning against
  # the public Terraform Registry (docs/specs/v1-tracer-bullet.md, Terraform
  # and state: "AVM modules are pinned exactly"), which is not a git source
  # and has no commit hash to pin -- the registry version pin is the
  # equivalent guarantee for a registry-sourced module.
  - CKV_TF_1 # Ensure Terraform module sources use a commit hash
